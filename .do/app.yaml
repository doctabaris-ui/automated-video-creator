name: ai-video-creator
services:
  - name: video-engine
    github:
      branch: main
      deploy_on_push: true
      repo: doctabaris-ui/automated-video-creator
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: LEONARDO_API_KEY
        value: d66167a8-7202-4114-bc78-26d172da75a3
      - key: INVIDEO_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CAPCUT_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ELEVENLABS_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: YOUTUBE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: YOUTUBE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: YOUTUBE_REFRESH_TOKEN
        scope: RUN_TIME
        type: SECRET
